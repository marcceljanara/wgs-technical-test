# ============================================================
# data.yaml — Konfigurasi Dataset YOLO Classification
# ============================================================
# Dataset: Fruits by YOLO (Roboflow)
# Format : YOLO Classification (subfolder per kelas)
# Source : https://universe.roboflow.com/fruitsdetection/fruits-by-yolo/dataset/1

# Root directory dataset (relatif terhadap direktori ai-object-detection/)
# Jalankan prepare_dataset.py untuk membuat struktur ini secara otomatis
path: ./datasets   # Root dataset
train: train       # Subfolder gambar training
val: val           # Subfolder gambar validasi
test: test         # Subfolder gambar testing

# Jumlah kelas buah
nc: 9

# Nama kelas (urutan index 0–8 harus konsisten)
names:
  - Apple       # 0
  - Banana      # 1
  - Grapes      # 2
  - Kiwi        # 3
  - Mango       # 4
  - Orange      # 5
  - Pineapple   # 6
  - Sugerapple  # 7
  - Watermelon  # 8

# Metadata Roboflow (informasi sumber dataset)
roboflow:
  workspace: fruitsdetection
  project: fruits-by-yolo
  version: 1
  license: CC BY 4.0
  url: https://universe.roboflow.com/fruitsdetection/fruits-by-yolo/dataset/1